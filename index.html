<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ელემენტების მკვლევარი</title>

<style>
body{font-family:Arial;background:#f3f7ff;margin:0;text-align:center;color:#1f2937;transition:.3s}
header{padding:25px;background:#1f4e79;color:white}
button{padding:12px 18px;margin:8px;border:0;border-radius:10px;background:#0077cc;color:white;cursor:pointer;font-size:16px;transition:.2s}
button:hover{transform:scale(1.05);background:#005fa3}
.table{display:grid;grid-template-columns:repeat(6,70px);gap:8px;justify-content:center;margin:25px auto}
.el{background:white;border-radius:10px;padding:8px;height:65px;box-shadow:0 2px 6px #bbb;cursor:pointer;transition:.2s}
.el:hover{background:#e8f5ff;transform:scale(1.08)}
.num{font-size:11px;text-align:left}.sym{font-size:23px;font-weight:bold;color:#0077cc}.name{font-size:10px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:10}
.card{background:white;border-radius:18px;max-width:400px;padding:25px;text-align:left;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.close{float:right;font-size:25px;cursor:pointer}.big{text-align:center;font-size:55px;color:#0077cc;font-weight:bold}
#quizSection,#aiChat{margin:40px}.correct{background:#16a34a!important}.wrong{background:#dc2626!important}
#chatInput{padding:12px;width:260px;max-width:80%;border-radius:10px;border:1px solid #ccc}
#chatAnswer{font-size:18px;max-width:600px;margin:15px auto;line-height:1.5}
.dark{background:#121212;color:white}.dark header{background:#000}.dark .el{background:#1f1f1f;color:white;box-shadow:0 2px 8px #000}.dark .el:hover{background:#263244}.dark .card{background:#222;color:white}.dark .sym,.dark .big{color:#4db8ff}.dark button{background:#374151}.dark button:hover{background:#4b5563}.dark #chatInput{background:#222;color:white;border-color:#555}

.scientists{max-width:900px;margin:40px auto;padding:25px;background:white;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,.15)}
.scientistGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:700px;margin:20px auto}
.scientistBtn{background:#0f766e}
.scientistBtn:hover{background:#115e59}
.dark .scientists{background:#1f1f1f;color:white;box-shadow:0 2px 8px #000}
@media(max-width:600px){.scientistGrid{grid-template-columns:1fr}}

@media(max-width:700px){.table{grid-template-columns:repeat(4,70px)}}
@media(max-width:380px){.table{grid-template-columns:repeat(3,70px)}}
</style>
</head>

<body>

<header id="elements">
<h1>⚛️ ელემენტების მკვლევარი</h1>
<p>დააჭირე ელემენტს და ნახე ინფორმაცია</p>
<button onclick="toggleDark()">🌙 მუქი რეჟიმი</button>
<button onclick="document.getElementById('quizSection').scrollIntoView({behavior:'smooth'})">🧠 ქუიზზე გადასვლა</button>
<button onclick="document.getElementById('aiChat').scrollIntoView({behavior:'smooth'})">🤖 ელემენტზე კითხვა</button>
<button onclick="document.getElementById('scientists').scrollIntoView({behavior:'smooth'})">👩‍🔬 მეცნიერები</button>
</header>

<div class="table" id="table"></div>

<div class="modal" id="modal" onclick="closeModal()">
<div class="card" onclick="event.stopPropagation()">
<span class="close" onclick="closeModal()">×</span>
<div class="big" id="mSymbol"></div>
<h2 id="mName"></h2>
<p id="mInfo"></p>
</div>
</div>

<section id="quizSection">
<h1>🧠 ელემენტების ქუიზი</h1>
<button onclick="startQuiz()">ქუიზის დაწყება</button>

<div id="quizBox" style="display:none">
<h2 id="timer">დრო: 60</h2>
<h3 id="question"></h3>
<div id="answers"></div>
<p id="score"></p>
</div>

<button onclick="document.getElementById('elements').scrollIntoView({behavior:'smooth'})">🧪 ელემენტებთან დაბრუნება</button>

<h2>🥇 ლიდერბორდი</h2>
<ol id="leaderboard"></ol>
</section>

<section id="aiChat">
  <h1>🤖 ჰკითხე ელემენტებზე</h1>
  <input id="chatInput" placeholder="ჩაწერე: oxygen, gold, iron...">
  <button onclick="askElement()">კითხვა</button>
  <p id="chatAnswer"></p>
</section>


<section id="scientists" class="scientists">
  <h1>👩‍🔬 ცნობილი ქიმიკოსები</h1>
  <p>დააჭირე მეცნიერის სახელს და ნახე მოკლე ინფორმაცია.</p>

  <div class="scientistGrid">
    <button class="scientistBtn" onclick="openScientist('დიმიტრი მენდელეევი','⚛️','რუსი ქიმიკოსი, რომელმაც შექმნა პერიოდული ცხრილი და იწინასწარმეტყველა ჯერ კიდევ აღმოუჩენელი ელემენტების არსებობა.')">დიმიტრი მენდელეევი</button>

    <button class="scientistBtn" onclick="openScientist('მარი კიური','☢️','პოლონელ-ფრანგი მეცნიერი. აღმოაჩინა პოლონიუმი და რადიუმი. პირველი ქალი იყო, რომელმაც ნობელის პრემია მიიღო.')">მარი კიური</button>

    <button class="scientistBtn" onclick="openScientist('რობერტ ბოილი','🧪','ირლანდიელი ქიმიკოსი. თანამედროვე ქიმიის ერთ-ერთი დამფუძნებელი და „ქიმიური ელემენტის“ ცნების განვითარებაში მნიშვნელოვანი ფიგურა.')">რობერტ ბოილი</button>

    <button class="scientistBtn" onclick="openScientist('ანტუან ლავუაზიე','🔥','ფრანგი ქიმიკოსი, რომელსაც ხშირად თანამედროვე ქიმიის მამას უწოდებენ. შეისწავლა ჟანგბადის როლი წვის პროცესში.')">ანტუან ლავუაზიე</button>

    <button class="scientistBtn" onclick="openScientist('ჯონ დალტონი','⚡','ინგლისელი მეცნიერი, რომელმაც შექმნა ატომური თეორია და ახსნა, რომ ნივთიერებები ატომებისგან შედგება.')">ჯონ დალტონი</button>
  </div>
</section>


<script>
const elements = [
["H","Hydrogen"],["He","Helium"],["Li","Lithium"],["Be","Beryllium"],["B","Boron"],["C","Carbon"],
["N","Nitrogen"],["O","Oxygen"],["F","Fluorine"],["Ne","Neon"],["Na","Sodium"],["Mg","Magnesium"],
["Al","Aluminium"],["Si","Silicon"],["P","Phosphorus"],["S","Sulfur"],["Cl","Chlorine"],["Ar","Argon"],
["K","Potassium"],["Ca","Calcium"],["Sc","Scandium"],["Ti","Titanium"],["V","Vanadium"],["Cr","Chromium"],
["Mn","Manganese"],["Fe","Iron"],["Co","Cobalt"],["Ni","Nickel"],["Cu","Copper"],["Zn","Zinc"],
["Ga","Gallium"],["Ge","Germanium"],["As","Arsenic"],["Se","Selenium"],["Br","Bromine"],["Kr","Krypton"],
["Rb","Rubidium"],["Sr","Strontium"],["Y","Yttrium"],["Zr","Zirconium"],["Nb","Niobium"],["Mo","Molybdenum"],
["Tc","Technetium"],["Ru","Ruthenium"],["Rh","Rhodium"],["Pd","Palladium"],["Ag","Silver"],["Cd","Cadmium"],
["In","Indium"],["Sn","Tin"],["Sb","Antimony"],["Te","Tellurium"],["I","Iodine"],["Xe","Xenon"],
["Cs","Cesium"],["Ba","Barium"],["La","Lanthanum"],["Ce","Cerium"],["Pr","Praseodymium"],["Nd","Neodymium"],
["Pm","Promethium"],["Sm","Samarium"],["Eu","Europium"],["Gd","Gadolinium"],["Tb","Terbium"],["Dy","Dysprosium"],
["Ho","Holmium"],["Er","Erbium"],["Tm","Thulium"],["Yb","Ytterbium"],["Lu","Lutetium"],["Hf","Hafnium"],
["Ta","Tantalum"],["W","Tungsten"],["Re","Rhenium"],["Os","Osmium"],["Ir","Iridium"],["Pt","Platinum"],
["Au","Gold"],["Hg","Mercury"],["Tl","Thallium"],["Pb","Lead"],["Bi","Bismuth"],["Po","Polonium"],
["At","Astatine"],["Rn","Radon"],["Fr","Francium"],["Ra","Radium"],["Ac","Actinium"],["Th","Thorium"],
["Pa","Protactinium"],["U","Uranium"],["Np","Neptunium"],["Pu","Plutonium"],["Am","Americium"],["Cm","Curium"],
["Bk","Berkelium"],["Cf","Californium"],["Es","Einsteinium"],["Fm","Fermium"],["Md","Mendelevium"],["No","Nobelium"],
["Lr","Lawrencium"],["Rf","Rutherfordium"],["Db","Dubnium"],["Sg","Seaborgium"],["Bh","Bohrium"],["Hs","Hassium"],
["Mt","Meitnerium"],["Ds","Darmstadtium"],["Rg","Roentgenium"],["Cn","Copernicium"],["Nh","Nihonium"],["Fl","Flerovium"],
["Mc","Moscovium"],["Lv","Livermorium"],["Ts","Tennessine"],["Og","Oganesson"]
];

const table=document.getElementById("table");
elements.forEach((e,i)=>{table.innerHTML+=`<div class="el" onclick="openModal('${e[0]}','${e[1]}',${i+1})"><div class="num">${i+1}</div><div class="sym">${e[0]}</div><div class="name">${e[1]}</div></div>`;});
function openModal(sym,name,num){document.getElementById("modal").style.display="flex";document.getElementById("mSymbol").innerHTML=sym;document.getElementById("mName").innerHTML=name;document.getElementById("mInfo").innerHTML="ატომური ნომერი: "+num+"<br>ეს არის ელემენტი "+name+".";}
function closeModal(){document.getElementById("modal").style.display="none";}

function openScientist(name,emoji,info){
document.getElementById("modal").style.display="flex";
document.getElementById("mSymbol").innerHTML=emoji;
document.getElementById("mName").innerHTML=name;
document.getElementById("mInfo").innerHTML=info;
}

function toggleDark(){document.body.classList.toggle("dark");}
function beep(type){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator(); const gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value=type==='correct'?700:180;
  gain.gain.value=.08; osc.start();
  setTimeout(()=>{osc.stop();ctx.close();}, type==='correct'?150:250);
}

const quizQuestions=[
{q:"რა არის Oxygen-ის სიმბოლო?",a:"O",options:["O","H","N","C"]},
{q:"რა არის Hydrogen-ის სიმბოლო?",a:"H",options:["O","H","He","Na"]},
{q:"რა არის Carbon-ის სიმბოლო?",a:"C",options:["Ca","C","Cl","Co"]},
{q:"რა არის Sodium-ის სიმბოლო?",a:"Na",options:["S","So","Na","N"]},
{q:"რა არის Helium-ის სიმბოლო?",a:"He",options:["H","He","Ho","Ha"]},
{q:"რა არის Iron-ის სიმბოლო?",a:"Fe",options:["Ir","I","Fe","F"]},
{q:"რა არის Gold-ის სიმბოლო?",a:"Au",options:["Ag","Au","G","Go"]},
{q:"რა არის Silver-ის სიმბოლო?",a:"Ag",options:["S","Si","Ag","Au"]},
{q:"რა არის Calcium-ის სიმბოლო?",a:"Ca",options:["C","Ca","Cl","Co"]},
{q:"რა არის Chlorine-ის სიმბოლო?",a:"Cl",options:["C","Ca","Cl","Ch"]}
];
let current=0,points=0,time=60,timer;

function startQuiz(){current=0;points=0;time=60;document.getElementById("quizBox").style.display="block";showQuestion();clearInterval(timer);timer=setInterval(()=>{time--;document.getElementById("timer").innerHTML="დრო: "+time;if(time<=0)finishQuiz();},1000);}
function showQuestion(){let q=quizQuestions[current];document.getElementById("question").innerHTML="კითხვა "+(current+1)+"/10: "+q.q;document.getElementById("answers").innerHTML=q.options.map(o=>`<button onclick="answer('${o}', this)">${o}</button>`).join("");document.getElementById("score").innerHTML="ქულა: "+points;}
function answer(choice,btn){
  const right=quizQuestions[current].a;
  const buttons=document.querySelectorAll("#answers button");
  buttons.forEach(b=>b.disabled=true);
  if(choice===right){points++;btn.classList.add("correct");beep('correct');}
  else{btn.classList.add("wrong");beep('wrong');buttons.forEach(b=>{if(b.innerText===right)b.classList.add("correct")});}
  current++;
  setTimeout(()=>{if(current>=10)finishQuiz();else showQuestion();},700);
}
function finishQuiz(){clearInterval(timer);document.getElementById("question").innerHTML="🏆 ქუიზი დასრულდა!";document.getElementById("answers").innerHTML="";document.getElementById("score").innerHTML="ქულა: "+points+"/10";let name=prompt("ჩაწერე შენი სახელი:");if(!name)name="მოთამაშე";let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];let existing=leaderboard.find(p=>p.name===name);if(existing){if(points>existing.score){existing.score=points;alert("🎉 ახალი საუკეთესო შედეგი!");}else{alert("❌ ახალი შედეგი რომ შეინახოს, უნდა გააუმჯობესო წინა ქულა ("+existing.score+"/10) .");showLeaderboard();return;}}else{leaderboard.push({name:name,score:points});}leaderboard.sort((a,b)=>b.score-a.score);leaderboard=leaderboard.slice(0,5);localStorage.setItem("leaderboard",JSON.stringify(leaderboard));showLeaderboard();}
function showLeaderboard(){let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];document.getElementById("leaderboard").innerHTML=leaderboard.map(p=>`<li>${p.name} - ${p.score}/10</li>`).join("");}

function askElement(){
  const question = document.getElementById("chatInput").value.toLowerCase().trim();
  const data = {
    oxygen: "🫁 Oxygen (O) - Atomic number 8. აუცილებელია სუნთქვისთვის და წვისთვის.",
    hydrogen: "💧 Hydrogen (H) - Atomic number 1. სამყაროში ყველაზე მსუბუქი ელემენტია.",
    carbon: "🌱 Carbon (C) - Atomic number 6. გვხვდება ყველა ცოცხალ ორგანიზმში.",
    iron: "🔩 Iron (Fe) - Atomic number 26. გამოიყენება მშენებლობასა და წარმოებაში.",
    gold: "🥇 Gold (Au) - Atomic number 79. ძვირფასი მეტალია, გამოიყენება სამკაულებსა და ელექტრონიკაში.",
    silver: "🥈 Silver (Ag) - Atomic number 47. ელექტრობის ძალიან კარგი გამტარია.",
    sodium: "🧂 Sodium (Na) - Atomic number 11. გვხვდება სუფრის მარილში.",
    helium: "🎈 Helium (He) - Atomic number 2. გამოიყენება ბუშტებსა და გაგრილების სისტემებში."
  };

  let answer = "❓ ეს ელემენტი ჯერ არ ვიცი. სცადე: oxygen, hydrogen, carbon, iron, gold, silver, sodium ან helium.";
  for(const key in data){
    if(question.includes(key)) answer = data[key];
  }
  document.getElementById("chatAnswer").innerHTML = answer;
}

showLeaderboard();
</script>
</body>
</html>
